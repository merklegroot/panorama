name: Build macOS

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: build-macos-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS
        run: flutter build macos --release

      - name: Package zip
        run: |
          mkdir -p ../release
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/Panorama.app \
            ../release/Panorama-macOS.zip

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: Panorama-macOS
          path: release/Panorama-macOS.zip
          if-no-files-found: error
