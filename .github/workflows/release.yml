name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (optional — auto-increments patch if empty)"
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          bump_patch() {
            local ver="${1#v}"
            local major minor patch
            IFS='.' read -r major minor patch _ <<< "$ver"
            major=${major:-0}
            minor=${minor:-0}
            patch=${patch:-0}
            echo "${major}.${minor}.$((patch + 1))"
          }

          current_from_pubspec() {
            sed -nE 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' flutter_app/pubspec.yaml | head -1
          }

          set_pubspec_version() {
            local ver="$1"
            sed -i.bak -E "s/^version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+(\+[0-9]+)?/version: ${ver}+1/" flutter_app/pubspec.yaml
            rm -f flutter_app/pubspec.yaml.bak
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              VERSION="${{ inputs.version }}"
            else
              LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -1)
              if [ -n "$LATEST_TAG" ]; then
                VERSION=$(bump_patch "$LATEST_TAG")
              else
                VERSION=$(current_from_pubspec)
              fi
            fi
            TAG="v${VERSION}"

            set_pubspec_version "$VERSION"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add flutter_app/pubspec.yaml
            if ! git diff --cached --quiet; then
              git commit -m "Release ${TAG}"
              git push origin HEAD:master
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'master' || github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Sync pubspec version
        run: |
          sed -i.bak -E "s/^version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+(\+[0-9]+)?/version: ${{ needs.prepare.outputs.version }}+1/" pubspec.yaml
          rm -f pubspec.yaml.bak

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package zip
        run: |
          mkdir -p ../release
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/Panorama.app \
            ../release/Panorama-${{ needs.prepare.outputs.version }}-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Panorama-macOS
          path: release/Panorama-*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Panorama-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Panorama ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          body: |
            ### macOS
            - Download the **`.zip`**, unzip it, and drag **Panorama.app** into **Applications**
            - First launch: **right-click → Open → Open** (unsigned build; one-time Gatekeeper prompt)
            - Or use the repo launcher: `./scripts/install-mac.sh` after building locally
          files: dist/*
