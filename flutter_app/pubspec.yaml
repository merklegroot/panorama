name: panorama
description: A Windows Explorer-inspired file manager for desktop.
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  desktop_drop: ^0.6.0
  file_selector: ^1.0.3
  path: ^1.9.1
  window_manager: ^0.5.1
  xterm: ^4.0.0
  flutter_pty: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
